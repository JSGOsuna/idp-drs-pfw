name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v4
#descargar node
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Instalar dependencias
      run: npm install
#correr la pagina
    - name: Build de la app
      run: npm run build

    - name: Levantar servidor
      run: npm run start &

    - name: Esperar a que esté listo
      run: npx wait-on http://localhost:3000

#pruebas de humo API
    - name: Instalar Newman
      run: npm install -g newman

    - name: Ejecutar pruebas de humo
      run: newman run pruebas_humo_api_drs.json

#pruebas playwright con pytest
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Instalar dependencias de pruebas UI
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-playwright pytest-html playwright

    - name: Instalar navegadores de Playwright
      run: python -m playwright install --with-deps chromium

    - name: Ejecutar pruebas UI con pytest
      run: |
        mkdir -p reportes
        pytest test_login_drs_ui.py --html=reportes/pytest-playwright-report.html --self-contained-html

    - name: Publicar reporte HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reporte-pytest-playwright
        path: reportes/pytest-playwright-report.html
        if-no-files-found: warn
